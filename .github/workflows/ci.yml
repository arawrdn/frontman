name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Clean ReScript build cache
        run: yarn rescript clean

      - name: Build project
        run: make build

  test-frontman-client:
    name: Test frontman-client
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: make -C libs/frontman-client test-coverage

      - name: Coverage report
        uses: 5monkeys/cobertura-action@master
        with:
          path: libs/frontman-client/coverage/cobertura-coverage.xml
          minimum_coverage: 70
          show_missing: true
          skip_covered: false
          only_changed_files: false

  test-frontman-core:
