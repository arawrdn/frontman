  test-frontman-server:
    name: Test frontman-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: frontman_server_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.19'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: apps/frontman_server/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/frontman_server/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: apps/frontman_server/_build
          key: ${{ runner.os }}-build-${{ hashFiles('apps/frontman_server/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: apps/frontman_server/priv/plts
          key: ${{ runner.os }}-plt-${{ hashFiles('apps/frontman_server/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-

      - name: Install dependencies
        run: make -C apps/frontman_server install

      - name: Run tests with coverage
        run: make -C apps/frontman_server test-coverage

      - name: Coverage details
        run: cd apps/frontman_server && MIX_ENV=test mix coveralls.detail

      - name: Coverage report
        uses: 5monkeys/cobertura-action@master
        with:
          path: apps/frontman_server/cover/cobertura.xml
          minimum_coverage: 75
          show_missing: true
          skip_covered: false
          only_changed_files: false

      - name: Run Dialyzer
        run: make -C apps/frontman_server dialyzer

  test-react-statestore:
