name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Clean ReScript build cache
        run: yarn rescript clean

      - name: Build project
        run: make build

  test-agent:
    name: Test libs/agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in libs/agent
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent:
              - 'libs/agent/**'

      - name: Setup Node.js
        if: steps.changes.outputs.agent == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        if: steps.changes.outputs.agent == 'true'
        run: corepack enable

      - name: Install dependencies
        if: steps.changes.outputs.agent == 'true'
        run: yarn install --frozen-lockfile

      - name: Clean ReScript build cache
        if: steps.changes.outputs.agent == 'true'
        run: yarn rescript clean

      - name: Run agent tests
        if: steps.changes.outputs.agent == 'true'
        run: cd libs/agent && make test
