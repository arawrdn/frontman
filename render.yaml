databases:
  - name: frontman-db
    plan: free
    databaseName: frontman
    postgresMajorVersion: "16"

services:
  - type: web
    name: frontman-server
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/frontman_server/Dockerfile
    dockerContext: ./
    healthCheckPath: /health
    preDeployCommand: /app/bin/migrate
    envVars:
      - key: PHX_HOST
        value: api.frontman.sh
      - key: PORT
        value: "4000"
      - key: PHX_SERVER
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: CLOAK_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: frontman-db
          property: connectionString
      - key: ARIZE_API_KEY
        sync: false
      - key: ARIZE_SPACE_ID
        sync: false
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_CLIENT_ID
        sync: false
